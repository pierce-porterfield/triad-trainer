<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#f4ecdc" />

    <!-- Per-page <title>, <meta name="description">, OG, Twitter, canonical and
         JSON-LD are emitted by vite-react-ssg's <Head> in each route component
         and inlined into the static HTML at build time. Routes that don't
         declare their own (the trainer routes) inherit the fallbacks below. -->
    <title>Music Theory Flashcards — Free Chord, Scale, Interval &amp; Key Drills</title>
    <meta name="description" content="Free interactive music theory flashcards. Drill chords, scales, intervals, key signatures, and note reading. Plus a daily music theory puzzle. No account, mobile-friendly, ad-free." />

    <!-- Default OG / Twitter image for any route that doesn't override.
         Per-page <Head> components also point at /og-default.png with absolute
         URLs so cross-domain unfurlers (Slack, iMessage, X, Discord) resolve
         correctly regardless of how the link was shared. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Music Theory Trainer" />
    <meta property="og:title" content="Music Theory Trainer" />
    <meta property="og:description" content="Interactive flash-card practice for triads, the circle of fifths, intervals, and a daily theory puzzle." />
    <meta property="og:url" content="https://theory-trainer.com" />
    <meta property="og:image" content="https://theory-trainer.com/og-default.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Music Theory Trainer" />
    <meta name="twitter:description" content="Interactive flash-card practice for triads, the circle of fifths, intervals, and a daily theory puzzle." />
    <meta name="twitter:image" content="https://theory-trainer.com/og-default.png" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
